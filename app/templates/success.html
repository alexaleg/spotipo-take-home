{% extends "base.html" %}

{% block title %}Connected{% endblock %}

{% block content %}
<div class="w-full max-w-md">
  <div class="bg-white rounded-2xl shadow-2xl overflow-hidden text-center">

    <div class="bg-gradient-to-r from-emerald-500 to-teal-600 px-8 py-10">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-white/20 rounded-full mb-4">
        <svg class="w-9 h-9 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7" />
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">You're connected!</h1>
    </div>

    <div class="px-8 py-8">
      <p class="text-slate-600 mb-6">
        You now have internet access. Enjoy your browsing session.
      </p>
      <p class="text-sm text-slate-400">
        You can close this window and continue using your device.
      </p>
    </div>

  </div>
</div>
{% endblock %}
